name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: # manual "Run release" button — covers pushes that don't fire the push trigger

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # push the release commit + tag, create the GitHub release
  id-token: write # sign the release commit + required for NPM Trusted Publisher OIDC

jobs:
  verify:
    name: Build, lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build # tsc -> build/
      - run: npm run build plugin # compile the config plugin
      - run: npm run lint
      - run: npm test

  release:
    name: Release & publish to npm
    needs: verify
    # On a merge/push to main, or a manual dispatch — never on PRs. The verify gate must pass first.
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the release commit + tag, create the GitHub release
      id-token: write # mint the OIDC token for npm Trusted Publisher publishing
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # check out the branch (not a detached SHA) so release-it can commit + push back
          fetch-depth: 0 # release-it needs full history + tags to compute the bump
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # >= 22.14.0 required for npm Trusted Publisher OIDC
          cache: npm
          registry-url: https://registry.npmjs.org # registry config for the OIDC publish (no token needed)
      - run: npm install -g npm@latest # npm >= 11.5.1 required for OIDC trusted publishing
      - run: npm ci
      - run: npm run build # build/ ships in the package (see "files" in package.json)
      - run: npm run build plugin # plugin/build ships too
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: release-it (bump, changelog, tag, GitHub release, npm publish)
        run: npx release-it --ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
